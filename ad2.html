<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  .ad-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    gap: 0;
  }
  .ad-unit {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .adsbygoogle {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>
<div class="ad-wrap">

  <div class="ad-unit">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7931973085541540" crossorigin="anonymous"></script>
    <ins class="adsbygoogle"
         style="display:block;width:100%;height:100%;"
         data-ad-client="ca-pub-7931973085541540"
         data-ad-slot="7979689649"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <div class="ad-unit">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7931973085541540" crossorigin="anonymous"></script>
    <ins class="adsbygoogle"
         style="display:block;width:100%;height:100%;"
         data-ad-client="ca-pub-7931973085541540"
         data-ad-slot="6750368452"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

</div>
</body>
</html>
